version: '3.8'

services:
  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: college-rag-backend
    ports:
      - "8000:8000"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - LLM_MODEL=llama3.2
      - EMBEDDING_MODEL=mxbai-embed-large
      - VECTOR_DB_PATH=/app/chroma_db
      - UPLOAD_DIR=/app/uploads
      - LOG_LEVEL=INFO
      - ALLOWED_ORIGINS=http://localhost:5173,http://localhost:3000,http://frontend:3000
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/chroma_db:/app/chroma_db
      - ./backend/logs:/app/logs
    depends_on:
      - ollama
    networks:
      - college-rag-network
    restart: unless-stopped

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: college-rag-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    networks:
      - college-rag-network
    restart: unless-stopped

  # Ollama LLM Service
  ollama:
    image: ollama/ollama:latest
    container_name: college-rag-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - college-rag-network
    restart: unless-stopped
    # Pull models on startup
    command: serve

volumes:
  ollama-data:

networks:
  college-rag-network:
    driver: bridge
